<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stemdeck</title>
  <meta name="theme-color" content="#101511" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Stemdeck" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/style.css?v=30" />
  <script>
    (() => {
      const shellVersion = "stemdeck-v30";
      const url = new URL(window.location.href);
      const hadCredentials = url.searchParams.has("username") || url.searchParams.has("password");

      url.searchParams.delete("username");
      url.searchParams.delete("password");
      if (hadCredentials) {
        window.history.replaceState({}, document.title, `${url.pathname}${url.search}${url.hash}`);
      }

      if (localStorage.getItem("stemdeck-shell-version") === shellVersion) {
        return;
      }

      localStorage.setItem("stemdeck-shell-version", shellVersion);
      const resetShell = async () => {
        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.filter((name) => name.startsWith("stemdeck-")).map((name) => caches.delete(name)));
        }
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      };

      resetShell()
        .catch(() => {});
    })();
  </script>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>Stemdeck</h1>
      </div>
      <div class="topbar-actions">
        <div class="language-switcher" role="group" aria-label="🌐">
          <button id="langEn" type="button" class="flag-button" data-lang="en" aria-label="English">🇬🇧</button>
          <button id="langUk" type="button" class="flag-button" data-lang="uk" aria-label="Українська">🇺🇦</button>
        </div>
        <div id="accountBar" class="account-bar hidden">
          <span id="usernameLabel"></span>
          <button id="authToggleBtn" type="button" class="secondary" data-i18n="login">Login</button>
          <button id="logoutBtn" type="button" data-i18n="logout">Logout</button>
        </div>
      </div>
    </header>

    <section id="authSection" class="card hidden">
      <form id="authForm" class="auth-form" method="post" action="/api/login" autocomplete="on">
        <div>
          <label for="username" class="label" data-i18n="username">Username</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>

        <div>
          <label for="password" class="label" data-i18n="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <div class="button-row">
          <button id="loginBtn" type="submit" data-i18n="login">Login</button>
          <button id="registerBtn" type="button" class="secondary" data-i18n="createAccount">Create account</button>
        </div>
      </form>
      <p id="authStatus" class="status" data-i18n="authPrompt">Optional: sign in to keep tracks longer.</p>
    </section>

    <section id="appSection" class="hidden">
      <section data-feature-panel="extractor">
        <section class="upload-panel">
          <div>
            <p class="eyebrow" data-i18n="newSplit">New split</p>
            <h2 id="uploadPanelTitle" data-i18n="dropFile">Upload audio or video</h2>
          </div>
          
          <div class="split-inputs">
            <div class="input-block">
              <label for="audioFile" class="label" data-i18n="tabUpload">File Upload</label>
              <input id="audioFile" type="file" accept="audio/*,video/*" />
            </div>
            
            <div class="or-divider">
              <span data-i18n="orDivider">— OR —</span>
            </div>
            
            <div class="input-block">
              <label for="youtubeUrl" class="label" data-i18n="tabYoutube">YouTube Link</label>
              <input id="youtubeUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." />
            </div>
          </div>

          <div class="upload-row">
            <button id="processBtn" type="button" data-i18n="process">Process</button>
          </div>
              <label class="mode-toggle" for="fastMode">
                <input id="fastMode" type="checkbox" />
                <span>
                  <strong data-i18n="fastModeTitle">Fast mode</strong>
                  <small data-i18n="fastModeHelp">Recommended for quick results. Turn off for higher quality.</small>
                </span>
              </label>
              <p id="status" class="status" data-i18n="chooseFile">Choose a file to start a job.</p>
            </section>

            <section class="jobs-layout">
              <section class="jobs-panel">
                <div class="section-heading">
                  <div>
                    <p class="eyebrow" data-i18n="library">Library</p>
                    <h2 data-i18n="pastUploads">Past uploads</h2>
                  </div>
                  <button id="refreshBtn" type="button" class="secondary" data-i18n="refresh">Refresh</button>
                </div>
                <div id="jobsList" class="jobs-list"></div>
              </section>

              <section id="playerSection" class="player-panel hidden">
                <p class="eyebrow" data-i18n="mixer">Mixer</p>
                <h2 id="playerTitle" data-i18n="player">Player</h2>
                <div class="controls-row">
                  <button id="playBtn" type="button" data-i18n="play">Play</button>
                  <input id="seek" type="range" min="0" max="1000" value="0" />
                  <span id="timeLabel">0:00 / 0:00</span>
                </div>

                <div class="mix-grid">
                  <div>
                    <h3 data-i18n="instrumental">Instrumental</h3>
                    <input id="instrumentalVolume" type="range" min="0" max="100" value="100" />
                    <button id="instrumentalMute" type="button" data-i18n="mute">Mute</button>
                  </div>
                  <div>
                    <h3 data-i18n="vocals">Vocals</h3>
                    <input id="vocalsVolume" type="range" min="0" max="100" value="100" />
                    <button id="vocalsMute" type="button" data-i18n="mute">Mute</button>
                  </div>
                </div>

                <div class="download-row">
                  <a id="downloadInstrumental" href="#" download="instrumental.wav" data-i18n="downloadInstrumental">Download instrumental</a>
                  <a id="downloadVocals" href="#" download="vocals.wav" data-i18n="downloadVocals">Download vocals</a>
                </div>

                <div id="chordsSection" class="chords-panel-inner hidden">
                  <div class="chords-header">
                    <span class="eyebrow" data-i18n="songChords">Chords</span>
                    <button id="detectChordsBtn" type="button" class="secondary" data-i18n="detectChords">Detect Chords</button>
                  </div>
                  <div id="chordsTrack" class="chords-track hidden"></div>
                </div>
              </section>
            </section>
          </section>
        </section>
  </main>

  <script>
    (() => {
      const authForm = document.getElementById("authForm");
      const authStatus = document.getElementById("authStatus");
      const authSection = document.getElementById("authSection");
      const appSection = document.getElementById("appSection");
      const accountBar = document.getElementById("accountBar");
      const usernameLabel = document.getElementById("usernameLabel");
      const authToggleBtn = document.getElementById("authToggleBtn");
      const loginBtn = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      const toggleAuth = (open) => {
        authSection.classList.toggle("hidden", !open);
        if (open) {
          authStatus.textContent = "Optional: sign in to keep tracks longer.";
          document.getElementById("username")?.focus();
        }
      };

      const showUser = (user) => {
        if (user.is_guest) {
          toggleAuth(false);
          usernameLabel.classList.add("hidden");
          authToggleBtn.classList.remove("hidden");
          logoutBtn.classList.add("hidden");
        } else {
          toggleAuth(false);
          usernameLabel.classList.remove("hidden");
          authToggleBtn.classList.add("hidden");
          logoutBtn.classList.remove("hidden");
        }
        appSection.classList.remove("hidden");
        accountBar.classList.remove("hidden");
        usernameLabel.textContent = user.username;
      };

      const showAuth = () => {
        authSection.classList.remove("hidden");
        appSection.classList.add("hidden");
        accountBar.classList.add("hidden");
        usernameLabel.textContent = "";
      };

      const postAuth = async (mode, event) => {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        authStatus.textContent = mode === "login" ? "Logging in..." : "Creating account...";

        try {
          const response = await fetch(`/api/${mode}`, {
            method: "POST",
            credentials: "same-origin",
            body: new FormData(authForm),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Request failed");
          }

          showUser(payload.user);
          window.dispatchEvent(new CustomEvent("stemdeck:auth", { detail: payload }));
        } catch (error) {
          authStatus.textContent = `Error: ${error.message}`;
        }
      };

      authForm.addEventListener("submit", (event) => postAuth("login", event), { capture: true });
      authToggleBtn.addEventListener("click", () => toggleAuth(authSection.classList.contains("hidden")));
      loginBtn.addEventListener("click", (event) => postAuth("login", event), { capture: true });
      registerBtn.addEventListener("click", (event) => postAuth("register", event), { capture: true });
      logoutBtn.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        await fetch("/api/logout", { method: "POST", credentials: "same-origin" });
        const response = await fetch("/api/guest", { method: "POST", credentials: "same-origin" });
        const payload = await response.json();
        showUser(payload.user);
        window.dispatchEvent(new CustomEvent("stemdeck:auth", { detail: payload }));
      }, { capture: true });

      fetch("/api/me", { credentials: "same-origin" })
        .then(async (response) => (response.ok ? (await response.json()).user : null))
        .then((user) => {
          if (user) {
            showUser(user);
          }
        })
        .catch(() => {});
    })();
  </script>
  <script src="/assets/i18n.js?v=30"></script>
  <script src="/assets/app.js?v=30"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
