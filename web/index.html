<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stemdeck</title>
  <meta name="theme-color" content="#101511" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Stemdeck" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div>
        <p class="eyebrow">Stemdeck</p>
        <h1 data-i18n="heroTitle">Extract vocal or instrumental</h1>
      </div>
      <div class="topbar-actions">
        <div class="language-switcher" role="group" aria-label="🌐">
          <button id="langEn" type="button" class="flag-button" data-lang="en" aria-label="English">🇬🇧</button>
          <button id="langUk" type="button" class="flag-button" data-lang="uk" aria-label="Українська">🇺🇦</button>
        </div>
        <div id="accountBar" class="account-bar hidden">
          <span id="usernameLabel"></span>
          <button id="logoutBtn" type="button" data-i18n="logout">Logout</button>
        </div>
      </div>
    </header>

    <section id="authSection" class="card">
      <form id="authForm" class="auth-form">
        <div>
          <label for="username" class="label" data-i18n="username">Username</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>

        <div>
          <label for="password" class="label" data-i18n="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <div class="button-row">
          <button id="loginBtn" type="submit" data-i18n="login">Login</button>
          <button id="registerBtn" type="button" class="secondary" data-i18n="createAccount">Create account</button>
        </div>
      </form>
      <p id="authStatus" class="status" data-i18n="authPrompt">Login or create an account to see your uploads.</p>
    </section>

    <section id="appSection" class="hidden">
      <section class="upload-panel">
        <div>
          <p class="eyebrow" data-i18n="newSplit">New split</p>
          <h2 data-i18n="dropFile">Drop in an audio or video file</h2>
        </div>
        <div class="upload-row">
          <input id="audioFile" type="file" accept="audio/*,video/*" />
          <button id="processBtn" type="button" data-i18n="process">Process</button>
        </div>
        <label class="mode-toggle" for="fastMode">
          <input id="fastMode" type="checkbox" checked />
          <span>
            <strong data-i18n="fastModeTitle">Fast mode</strong>
            <small data-i18n="fastModeHelp">Recommended for quick results. Turn off for higher quality.</small>
          </span>
        </label>
        <p id="status" class="status" data-i18n="chooseFile">Choose a file to start a job.</p>
      </section>

      <section class="jobs-layout">
        <section class="jobs-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="library">Library</p>
              <h2 data-i18n="pastUploads">Past uploads</h2>
            </div>
            <button id="refreshBtn" type="button" class="secondary" data-i18n="refresh">Refresh</button>
          </div>
          <div id="jobsList" class="jobs-list"></div>
        </section>

        <section id="playerSection" class="player-panel hidden">
          <p class="eyebrow" data-i18n="mixer">Mixer</p>
          <h2 id="playerTitle" data-i18n="player">Player</h2>
          <div class="controls-row">
            <button id="playBtn" type="button" data-i18n="play">Play</button>
            <input id="seek" type="range" min="0" max="1000" value="0" />
            <span id="timeLabel">0:00 / 0:00</span>
          </div>

          <div class="mix-grid">
            <div>
              <h3 data-i18n="instrumental">Instrumental</h3>
              <input id="instrumentalVolume" type="range" min="0" max="100" value="100" />
              <button id="instrumentalMute" type="button" data-i18n="mute">Mute</button>
            </div>
            <div>
              <h3 data-i18n="vocals">Vocals</h3>
              <input id="vocalsVolume" type="range" min="0" max="100" value="100" />
              <button id="vocalsMute" type="button" data-i18n="mute">Mute</button>
            </div>
          </div>

          <div class="download-row">
            <a id="downloadInstrumental" href="#" download="instrumental.wav" data-i18n="downloadInstrumental">Download instrumental</a>
            <a id="downloadVocals" href="#" download="vocals.wav" data-i18n="downloadVocals">Download vocals</a>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
